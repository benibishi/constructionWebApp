<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuildMaster - Construction Management</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-brand">
            <i class="fas fa-hard-hat"></i>
            <span>BuildMaster</span>
        </div>
        <div class="nav-menu">
            <a href="#" class="nav-link active" data-tab="dashboard">
                <i class="fas fa-tachometer-alt"></i>
                <span>Dashboard</span>
            </a>
            <a href="#" class="nav-link" data-tab="tasks">
                <i class="fas fa-tasks"></i>
                <span>Tasks</span>
            </a>
            <a href="#" class="nav-link" data-tab="team">
                <i class="fas fa-users"></i>
                <span>Team</span>
            </a>
        </div>
        <div class="nav-user">
            <img src="https://ui-avatars.com/api/?name=Admin+User&background=random" alt="User">
            <span>Admin User</span>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Dashboard Tab -->
        <section id="dashboard" class="tab-content active">
            <div class="page-header">
                <h1>Project Dashboard</h1>
                <button class="btn btn-primary" id="addProjectBtn">
                    <i class="fas fa-plus"></i> New Project
                </button>
            </div>

            <!-- Stats Cards -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon bg-blue">
                        <i class="fas fa-project-diagram"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="totalProjects">0</h3>
                        <p>Total Projects</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon bg-green">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="completedTasks">0</h3>
                        <p>Completed Tasks</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon bg-orange">
                        <i class="fas fa-exclamation-triangle"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="overdueTasks">0</h3>
                        <p>Overdue Tasks</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon bg-purple">
                        <i class="fas fa-users"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="teamMembers">0</h3>
                        <p>Team Members</p>
                    </div>
                </div>
            </div>

            <!-- Projects Grid -->
            <div class="section-header">
                <h2>Active Projects</h2>
            </div>
            <div class="projects-grid" id="projectsContainer">
                <!-- Projects will be loaded here -->
            </div>

            <!-- Recent Activity -->
            <div class="section-header">
                <h2>Recent Activity</h2>
            </div>
            <div class="activity-feed" id="activityFeed">
                <!-- Activity items will be loaded here -->
            </div>
        </section>

        <!-- Tasks Tab -->
        <section id="tasks" class="tab-content">
            <div class="page-header">
                <h1>Task Management</h1>
                <button class="btn btn-primary" id="addTaskBtn">
                    <i class="fas fa-plus"></i> New Task
                </button>
            </div>

            <!-- Task Filters -->
            <div class="task-filters">
                <select id="projectFilter">
                    <option value="">All Projects</option>
                </select>
                <select id="statusFilter">
                    <option value="">All Statuses</option>
                    <option value="pending">Pending</option>
                    <option value="in-progress">In Progress</option>
                    <option value="completed">Completed</option>
                </select>
                <input type="text" id="searchTasks" placeholder="Search tasks...">
            </div>

            <!-- Tasks List -->
            <div class="tasks-container" id="tasksContainer">
                <!-- Tasks will be loaded here -->
            </div>
        </section>

        <!-- Team Tab -->
        <section id="team" class="tab-content">
            <div class="page-header">
                <h1>Team Management</h1>
                <button class="btn btn-primary" id="addMemberBtn">
                    <i class="fas fa-plus"></i> Add Member
                </button>
            </div>

            <!-- Team Members Grid -->
            <div class="team-grid" id="teamContainer">
                <!-- Team members will be loaded here -->
            </div>
        </section>
    </main>

    <!-- Modal Templates -->
    <div class="modal" id="projectModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="projectModalTitle">Add New Project</h2>
                <span class="close">&times;</span>
            </div>
            <div class="modal-body">
                <form id="projectForm">
                    <input type="hidden" id="projectId">
                    <div class="form-group">
                        <label for="projectName">Project Name</label>
                        <input type="text" id="projectName" required>
                    </div>
                    <div class="form-group">
                        <label for="projectDescription">Description</label>
                        <textarea id="projectDescription" rows="3"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="startDate">Start Date</label>
                            <input type="date" id="startDate" required>
                        </div>
                        <div class="form-group">
                            <label for="endDate">End Date</label>
                            <input type="date" id="endDate" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="projectStatus">Status</label>
                        <select id="projectStatus">
                            <option value="planning">Planning</option>
                            <option value="active">Active</option>
                            <option value="on-hold">On Hold</option>
                            <option value="completed">Completed</option>
                        </select>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" id="cancelProject">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Project</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal" id="taskModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="taskModalTitle">Add New Task</h2>
                <span class="close">&times;</span>
            </div>
            <div class="modal-body">
                <form id="taskForm">
                    <input type="hidden" id="taskId">
                    <div class="form-group">
                        <label for="taskName">Task Name</label>
                        <input type="text" id="taskName" required>
                    </div>
                    <div class="form-group">
                        <label for="taskDescription">Description</label>
                        <textarea id="taskDescription" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="taskProject">Project</label>
                        <select id="taskProject" required>
                            <option value="">Select Project</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="taskDueDate">Due Date</label>
                            <input type="date" id="taskDueDate" required>
                        </div>
                        <div class="form-group">
                            <label for="taskPriority">Priority</label>
                            <select id="taskPriority">
                                <option value="low">Low</option>
                                <option value="medium">Medium</option>
                                <option value="high">High</option>
                                <option value="critical">Critical</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="taskAssignee">Assign To</label>
                        <select id="taskAssignee">
                            <option value="">Unassigned</option>
                        </select>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" id="cancelTask">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Task</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal" id="teamModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="teamModalTitle">Add Team Member</h2>
                <span class="close">&times;</span>
            </div>
            <div class="modal-body">
                <form id="teamForm">
                    <input type="hidden" id="memberId">
                    <div class="form-group">
                        <label for="memberName">Full Name</label>
                        <input type="text" id="memberName" required>
                    </div>
                    <div class="form-group">
                        <label for="memberEmail">Email</label>
                        <input type="email" id="memberEmail" required>
                    </div>
                    <div class="form-group">
                        <label for="memberRole">Role</label>
                        <select id="memberRole" required>
                            <option value="">Select Role</option>
                            <option value="project-manager">Project Manager</option>
                            <option value="site-supervisor">Site Supervisor</option>
                            <option value="engineer">Engineer</option>
                            <option value="foreman">Foreman</option>
                            <option value="worker">Worker</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="memberPhone">Phone</label>
                        <input type="tel" id="memberPhone">
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" id="cancelMember">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Member</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/tasks.js"></script>
    <script src="js/team.js"></script>
</body>

</html>
